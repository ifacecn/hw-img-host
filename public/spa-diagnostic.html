<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdgeOne Pages SPA 路由测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }
        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
        }
        h2 {
            margin-top: 0;
            color: #ffd700;
        }
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .test-btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .test-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            font-family: monospace;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 100px;
            max-height: 300px;
            overflow-y: auto;
        }
        .success { color: #4ade80; }
        .error { color: #ef4444; }
        .warning { color: #fbbf24; }
        .info { color: #60a5fa; }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            font-weight: bold;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 EdgeOne Pages SPA 路由诊断</h1>
        
        <div class="section">
            <h2>📋 当前状态</h2>
            <div id="current-status" class="result">
                正在检测环境...
            </div>
        </div>
        
        <div class="section">
            <h2>🛠️ SPA 路由测试</h2>
            <div class="test-grid">
                <button class="test-btn" onclick="testRoute('/')">
                    🏠 测试首页
                </button>
                <button class="test-btn" onclick="testRoute('/login')">
                    🔑 测试登录页
                </button>
                <button class="test-btn" onclick="testRoute('/admin')">
                    ⚙️ 测试管理页
                </button>
                <button class="test-btn" onclick="testRoute('/debug')">
                    🐛 测试调试页
                </button>
                <button class="test-btn" onclick="testRoute('/non-existent-route')">
                    ❌ 测试不存在路由
                </button>
                <button class="test-btn" onclick="testRoute('/api/')">
                    🔌 测试API
                </button>
            </div>
            <div id="route-result" class="result">
                点击上方按钮开始测试
            </div>
        </div>
        
        <div class="section">
            <h2>📁 文件结构检查</h2>
            <div class="test-grid">
                <button class="test-btn" onclick="testFile('/index.html')">
                    📄 index.html
                </button>
                <button class="test-btn" onclick="testFile('/favicon.ico')">
                    🖼️ favicon.ico
                </button>
                <button class="test-btn" onclick="testFile('/assets/')">
                    📦 assets目录
                </button>
                <button class="test-btn" onclick="testFile('/routes.json')">
                    🛣️ routes.json
                </button>
            </div>
            <div id="file-result" class="result">
                点击上方按钮测试文件
            </div>
        </div>
        
        <div class="section">
            <h2>⚙️ EdgeOne 配置建议</h2>
            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px;">
                <h3 class="warning">如果 SPA 路由返回 404，请检查：</h3>
                <ol>
                    <li>EdgeOne Pages 项目设置 → <strong>开启「单页应用」选项</strong></li>
                    <li>404 页面配置 → <strong>指向 index.html</strong></li>
                    <li>确保 <code>routes.json</code> 已上传并正确配置</li>
                    <li>构建输出应包含 <code>dist/index.html</code></li>
                </ol>
                <p class="info">💡 提示：访问 <code>/simple-mini-test.html</code> 测试静态文件服务</p>
            </div>
        </div>
    </div>

    <script>
        const currentStatus = document.getElementById('current-status');
        const routeResult = document.getElementById('route-result');
        const fileResult = document.getElementById('file-result');
        
        let logs = [];
        
        function log(target, message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const logEntry = `[${time}] <span class="${type}">${message}</span>`;
            logs.push({time, message, type});
            
            target.innerHTML = logEntry + '<br>' + target.innerHTML;
            console[type === 'error' ? 'error' : 'log'](message);
        }
        
        async function testRoute(path) {
            log(routeResult, `🔄 测试路由: ${path}`, 'info');
            
            try {
                const response = await fetch(path);
                const contentType = response.headers.get('content-type') || '';
                const status = `${response.status} ${response.statusText}`;
                
                let content = '';
                if (contentType.includes('text/html')) {
                    const text = await response.text();
                    content = text.substring(0, 500) + (text.length > 500 ? '...' : '');
                } else if (contentType.includes('application/json')) {
                    content = await response.text();
                }
                
                if (response.status === 404 && path !== '/non-existent-route') {
                    log(routeResult, `❌ ${path} - ${status} (SPA 路由失效)`, 'error');
                    log(routeResult, '💡 需要配置 EdgeOne Pages SPA 模式', 'warning');
                } else if (response.ok || response.status === 200) {
                    log(routeResult, `✅ ${path} - ${status}`, 'success');
                    if (content.includes('<!DOCTYPE html>')) {
                        log(routeResult, '📄 返回的是 index.html (SPA 工作正常)', 'success');
                    }
                } else {
                    log(routeResult, `⚠️ ${path} - ${status}`, 'warning');
                }
            } catch (error) {
                log(routeResult, `❌ ${path} - ${error.message}`, 'error');
            }
        }
        
        async function testFile(path) {
            log(fileResult, `📁 测试文件: ${path}`, 'info');
            
            try {
                const response = await fetch(path);
                const status = `${response.status} ${response.statusText}`;
                const contentType = response.headers.get('content-type') || '';
                const contentLength = response.headers.get('content-length') || '未知';
                
                if (response.ok) {
                    log(fileResult, `✅ ${path} - ${status} (${contentLength}字节)`, 'success');
                    log(fileResult, `📄 Content-Type: ${contentType}`, 'info');
                } else if (response.status === 404) {
                    log(fileResult, `❌ ${path} - 文件不存在`, 'error');
                } else {
                    log(fileResult, `⚠️ ${path} - ${status}`, 'warning');
                }
            } catch (error) {
                log(fileResult, `❌ ${path} - ${error.message}`, 'error');
            }
        }
        
        // 页面加载时自动检测
        window.addEventListener('load', () => {
            const statusHtml = `
                <div class="info">🌐 URL: ${window.location.href}</div>
                <div class="info">📱 浏览器: ${navigator.userAgent.substring(0, 60)}...</div>
                <div class="info">⏰ 时间: ${new Date().toLocaleString()}</div>
                <div class="${window.location.pathname === '/' ? 'success' : 'warning'}">
                    📍 当前路径: ${window.location.pathname}
                </div>
            `;
            currentStatus.innerHTML = statusHtml;
            
            // 自动测试几个关键路由
            setTimeout(() => testRoute('/'), 500);
            setTimeout(() => testRoute('/api/'), 1000);
            setTimeout(() => testFile('/index.html'), 1500);
        });
        
        // 错误捕获
        window.addEventListener('error', (e) => {
            log(routeResult, `JavaScript错误: ${e.message}`, 'error');
        });
    </script>
</body>
</html>
